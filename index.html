<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/favicon-32x32.png" type="image/x-icon">
    <title>Frontend Mentor | Article Preview Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="flex items-center justify-center h-screen w-full bg-Light-Grayish-Blue">
        <section class="flex w-1/2 bg-white rounded-lg">
            <img src="/images/drawers.jpg" class="object-cover w-80 h-auto rounded-l-lg" alt="Drawers">

            <div class="flex flex-col px-12 py-8 gap-6">
                <div class="flex flex-col gap-4">
                    <h3 class="text-xl font-semibold leading-7 text-Very-Dark-Grayish-Blue">Shift the overall look and
                        feel by adding these
                        wonderful
                        touches to furniture in your home</h3>
                    <p class="text-xs font-medium leading-5 text-Desaturated-Dark-Blue">Ever been in a room and felt
                        like something
                        was missing? Perhaps
                        it felt slightly bare and uninviting. I’ve got some simple tips
                        to help you make any room feel complete.</p>
                </div>

                <div class="flex items-center gap-2">
                    <img src="/images/avatar-michelle.jpg" class="w-8 rounded-full" alt="Michelle Appleton">
                    <div class="flex flex-col text-Very-Dark-Grayish-Blue">
                        <h6 class="text-xs font-bold text-Very-Dark-Grayish-Blue tracking-wide">Michelle Appleton</h6>
                        <p class="text-xs text-Desaturated-Dark-Blue tracking-wide">28 Jun 2020</p>
                    </div>
                    <div class="ml-auto bg-Light-Grayish-Blue p-2 rounded-full">
                        <img src="/images/icon-share.svg" alt="Share">
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
